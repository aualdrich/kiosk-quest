<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kiosk Quest API Docs</title>
    <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">
    <style>
      body {
        margin: 0;
        background: #0f172a;
      }

      .swagger-ui .topbar {
        display: none;
      }

      .docs-header {
        padding: 24px 24px 0;
        color: #e2e8f0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .docs-header h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }

      .docs-header p {
        margin: 0;
        max-width: 60rem;
        color: #cbd5e1;
      }

      #swagger-ui {
        margin-top: 16px;
        background: #fff;
      }
    </style>
  </head>
  <body>
    <div class="docs-header">
      <h1>Kiosk Quest API Docs</h1>
      <p>Documentation is driven by <code>public/openapi.yml</code> and rendered here with Swagger UI.</p>
    </div>
    <div id="swagger-ui"></div>
    <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
    <script>
      window.ui = SwaggerUIBundle({
        url: "/openapi.yml",
        dom_id: "#swagger-ui",
        deepLinking: true,
        presets: [SwaggerUIBundle.presets.apis],
        layout: "BaseLayout"
      });
    </script>
  </body>
</html>
